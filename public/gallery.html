<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sprite Gallery</title>
<style>
  body { background:#f5f0e8; font-family:sans-serif; padding:20px; max-width:500px; margin:0 auto; }
  h2 { text-align:center; font-size:16px; margin:20px 0 12px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:24px; }
  .card { text-align:center; background:#fff; padding:10px; border-radius:8px; border:2px solid #ddd; }
  .card img { image-rendering:pixelated; }
  .card .name { font-size:10px; margin-top:4px; color:#555; }
  .char-card { width:90px; }
  .char-card img { width:64px; height:64px; }
  .tier-card { width:75px; }
  .tier-card img { width:48px; height:48px; }
</style></head><body>
<h2>종목 캐릭터 (9종)</h2>
<div class="grid">
  <div class="card char-card"><img src="/sprites/samsong.svg"><div class="name">삼송전기</div></div>
  <div class="card char-card"><img src="/sprites/teslur.svg"><div class="name">테슬러모터스</div></div>
  <div class="card char-card"><img src="/sprites/gemstop.svg"><div class="name">겜스톱</div></div>
  <div class="card char-card"><img src="/sprites/lunacoing.svg"><div class="name">루나코잉</div></div>
  <div class="card char-card"><img src="/sprites/envidio.svg"><div class="name">엔비디오</div></div>
  <div class="card char-card"><img src="/sprites/kakamot.svg"><div class="name">카카못</div></div>
  <div class="card char-card"><img src="/sprites/hannwa.svg"><div class="name">한놔에어</div></div>
  <div class="card char-card"><img src="/sprites/crapton.svg"><div class="name">크랩톤</div></div>
  <div class="card char-card"><img src="/sprites/kupang.svg"><div class="name">쿠빵</div></div>
</div>
<h2>등급 아이콘 (13종)</h2>
<div class="grid">
  <div class="card tier-card"><img src="/sprites/tier_god.svg"><div class="name">버그 아님?</div></div>
  <div class="card tier-card"><img src="/sprites/tier_legend.svg"><div class="name">전설의 단타왕</div></div>
  <div class="card tier-card"><img src="/sprites/tier_pro.svg"><div class="name">프로 개미</div></div>
  <div class="card tier-card"><img src="/sprites/tier_beast.svg"><div class="name">야수의 심장</div></div>
  <div class="card tier-card"><img src="/sprites/tier_good.svg"><div class="name">쏠쏠한 수익</div></div>
  <div class="card tier-card"><img src="/sprites/tier_okay.svg"><div class="name">용돈 벌이</div></div>
  <div class="card tier-card"><img src="/sprites/tier_meh.svg"><div class="name">본전치기</div></div>
  <div class="card tier-card"><img src="/sprites/tier_sad.svg"><div class="name">개미의 눈물</div></div>
  <div class="card tier-card"><img src="/sprites/tier_cry.svg"><div class="name">물린 개미</div></div>
  <div class="card tier-card"><img src="/sprites/tier_dead.svg"><div class="name">깡통계좌</div></div>
  <div class="card tier-card"><img src="/sprites/tier_doom.svg"><div class="name">반대매매</div></div>
  <div class="card tier-card"><img src="/sprites/tier_hell.svg"><div class="name">상장폐지</div></div>
  <div class="card tier-card"><img src="/sprites/tier_idle.svg"><div class="name">구경만 함</div></div>
</div>
</body></html>
